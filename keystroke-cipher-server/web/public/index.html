<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KeyCipher P2P</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-info">
      <div>
        <p class="label">Peers connected</p>
        <p class="value" id="topPeers">0</p>
      </div>
      <div>
        <p class="label">Inbox waiting</p>
        <p class="value" id="inboxCount">0</p>
      </div>
      <div>
        <p class="label">Outbox queued</p>
        <p class="value" id="outboxCount">0</p>
      </div>
    </header>

    <main class="layout">

      <section class="column peers">
        <div class="column-title">Peers</div>
        <div id="peerContainer"></div>
      </section>

      <section class="column inbox-col">
        <div class="column-title">Inbox</div>
        <div id="inboxPanel" class="msg-panel"></div>
      </section>

      <section class="column outbox-col">
        <div class="column-title">Outbox</div>
        <div id="outboxPanel" class="msg-panel"></div>
      </section>

    </main>

    <div class="keyboard-echo">
      <input id="echoInput" type="text" placeholder="Keyboard echo — type to preview your message before hitting Enter to send..." readonly />
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
